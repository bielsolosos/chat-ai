spring:
  application:
    name: aichat
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aichat}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-2.5-flash}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2}
  chat-ai:
    model-to-use: ${MODEL_TO_USE:gemini}

logging:
  level:
    org.flywaydb: info

